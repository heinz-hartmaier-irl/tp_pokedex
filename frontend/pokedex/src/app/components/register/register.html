<div class="register-wrapper">
    <div class="register-card pk-glass animate-fade-in">
        <h2>Nouveau dresseur</h2>
        <p>Rejoignez l'aventure et commencez votre collection.</p>

        <form (submit)="register(); $event.preventDefault()">
            <div class="form-group">
                <label for="username">Nom d'utilisateur'</label>
                <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Sacha" required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="sacha@pallet.com"
                    required />
            </div>

            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                    required />
            </div>

            <div *ngIf="error" class="error-msg">
                {{ error }}
            </div>

            <button type="submit" class="pk-btn pk-btn-secondary register-btn">
                S'inscrire
            </button>
        </form>

        <a routerLink="/login" class="login-link">
            Déjà dresseur ? <span>Se connecter</span>
        </a>
    </div>
</div>
