<div class="login-wrapper">
  <div class="login-card pk-glass animate-fade-in">
    <h2>Bon retour !</h2>
    <p>Prêt à attraper les tous ? Connectez-vous à votre Pokédex.</p>

    <form (submit)="login(); $event.preventDefault()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email"
          [(ngModel)]="email" 
          name="email" 
          placeholder="sacha@pallet.com" 
          required 
        />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input 
          type="password" 
          id="password"
          [(ngModel)]="password" 
          name="password" 
          placeholder="••••••••" 
          required 
        />
      </div>

      <div *ngIf="error" class="error-msg">
        {{ error }}
      </div>

      <button type="submit" class="pk-btn pk-btn-primary login-btn">
        Se connecter
      </button>
    </form>

    <a routerLink="/register" class="register-link">
      Nouveau dresseur ? <span>Créer un compte</span>
    </a>
  </div>
</div>
